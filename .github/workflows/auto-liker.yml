name: Instagram Auto Liker

on:
  schedule:
    - cron: '0 6,12,18 * * *'
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'all'
        type: choice
        options:
          - catchup
          - maintenance
          - all

jobs:
  like-posts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx playwright install --with-deps chromium

      - name: Create auth_ig_1.json
        env:
          AUTH: ${{ secrets.AUTH_IG_1 }}
        run: echo "$AUTH" > auth_ig_1.json

      - name: Determine RUN_MODE
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RUN_MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV
          else
            HOUR=$(date -u +%H)
            case "$HOUR" in
              06|12|18) echo "RUN_MODE=catchup" >> $GITHUB_ENV ;;
              *) echo "RUN_MODE=maintenance" >> $GITHUB_ENV ;;
            esac
          fi

      - name: Run Bot
        run: node src/index.js --account=ig_account_1 --mode=$RUN_MODE
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
